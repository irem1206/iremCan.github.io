<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İrem Can | </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-dark.min.css">
    <style>
        body { background-color: #000000 !important; margin: 0; display: flex; justify-content: center; }
        .markdown-body { 
            box-sizing: border-box; 
            min-width: 200px; 
            max-width: 980px; 
            margin: 0 auto; 
            padding: 45px; 
            background-color: #000000 !important; 
            color: #c9d1d9;
        }
        @media (max-width: 767px) { .markdown-body { padding: 15px; } }
        img { max-width: 100%; display: inline-block; vertical-align: middle; }
    </style>
</head>
<body class="markdown-body">
    <div id="content">Yükleniyor...</div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        fetch('README.md')
            .then(response => response.text())
            .then(text => {
                // Tüm emoji kodlarını (örn: :star:) gerçek emojilere çevirir
                const emojiMap = {
                    ':technologist:': '🧑‍💻',
                    ':mortar_board:': '🎓',
                    ':star:': '⭐',
                    ':file_folder:': '📁',
                    ':wrench:': '🔧',
                    ':bar_chart:': '📊',
                    ':video_game:': '🎮'
                };
                
                let updatedText = text;
                Object.keys(emojiMap).forEach(key => {
                    updatedText = updatedText.split(key).join(emojiMap[key]);
                });

                document.getElementById('content').innerHTML = marked.parse(updatedText);
            });
    </script>
</body>
</html>
